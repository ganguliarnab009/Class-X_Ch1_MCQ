<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>মাধ্যমিক জীবনবিজ্ঞান সহায়ক</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Anek+Bangla:wght@400;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['"Anek Bangla"', 'sans-serif'] },
                    colors: { primary: '#059669', secondary: '#10b981', dark: '#064e3b' }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Anek Bangla', sans-serif; background-color: #f3f4f6; }
        .spinner { border: 4px solid rgba(0,0,0,0.1); border-left-color: #059669; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #10b981; border-radius: 4px; }
        .tab-btn.active { border-bottom: 2px solid #059669; color: #059669; font-weight: bold; }
    </style>
</head>
<body class="text-gray-800 antialiased overflow-x-hidden">

    <!-- Loading Overlay -->
    <div id="loader" class="fixed inset-0 bg-white/80 z-[100] hidden flex-col items-center justify-center backdrop-blur-sm">
        <div class="spinner mb-4"></div>
        <h2 class="text-xl font-bold text-primary">লোড হচ্ছে...</h2>
    </div>

    <!-- Toast Notifications -->
    <div id="toast-container" class="fixed top-5 right-5 z-[110] flex flex-col gap-2"></div>

    <!-- MAIN APP CONTAINER -->
    <div id="app" class="min-h-screen flex flex-col">

        <!-- LOGIN VIEW -->
        <div id="view-login" class="flex-1 flex items-center justify-center p-4">
            <div class="bg-white rounded-2xl shadow-xl w-full max-w-md overflow-hidden">
                <div class="bg-primary p-6 text-center text-white">
                    <i class="fa-solid fa-leaf text-4xl mb-2"></i>
                    <h1 class="text-2xl font-bold">মাধ্যমিক জীবনবিজ্ঞান সহায়ক</h1>
                </div>
                
                <div class="flex border-b">
                    <button onclick="toggleAuthTab('student')" id="tab-login-student" class="flex-1 py-3 font-semibold bg-gray-50 text-primary border-b-2 border-primary transition">ছাত্র/ছাত্রী</button>
                    <button onclick="toggleAuthTab('admin')" id="tab-login-admin" class="flex-1 py-3 font-semibold text-gray-500 hover:bg-gray-50 transition">অ্যাডমিন</button>
                </div>

                <div class="p-6">
                    <!-- Student Form -->
                    <form id="form-student-login" class="space-y-4" onsubmit="handleStudentLogin(event)">
                        <div>
                            <label class="block text-sm font-semibold mb-1">নাম <span class="text-red-500">*</span></label>
                            <input type="text" id="std-name" required class="w-full border rounded-lg px-3 py-2 focus:outline-primary" placeholder="তোমার নাম">
                        </div>
                        <div class="flex gap-4">
                            <div class="flex-1">
                                <label class="block text-sm font-semibold mb-1">রোল নং <span class="text-red-500">*</span></label>
                                <input type="number" id="std-roll" required class="w-full border rounded-lg px-3 py-2 focus:outline-primary" placeholder="রোল">
                            </div>
                            <div class="flex-1">
                                <label class="block text-sm font-semibold mb-1">সেকশন <span class="text-red-500">*</span></label>
                                <input type="text" id="std-sec" required class="w-full border rounded-lg px-3 py-2 focus:outline-primary" placeholder="A/B/C">
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-semibold mb-1">শ্রেণী</label>
                            <input type="text" id="std-class" value="দশম শ্রেণী (মাধ্যমিক)" readonly class="w-full border rounded-lg px-3 py-2 bg-gray-100 text-gray-600">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold mb-1">বিদ্যালয়ের নাম</label>
                            <input type="text" id="std-school" value="Hatgacha Haridas Vidyapith (H.S.)" class="w-full border rounded-lg px-3 py-2 focus:outline-primary">
                        </div>
                        <button type="submit" class="w-full bg-primary hover:bg-dark text-white font-bold py-2 px-4 rounded-lg transition shadow-md">প্রবেশ করুন</button>
                    </form>

                    <!-- Admin Form -->
                    <form id="form-admin-login" class="space-y-4 hidden" onsubmit="handleAdminLogin(event)">
                        <div>
                            <label class="block text-sm font-semibold mb-1">অ্যাডমিন আইডি</label>
                            <input type="text" id="admin-id" required class="w-full border rounded-lg px-3 py-2 focus:outline-primary" placeholder="Admin ID">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold mb-1">পাসওয়ার্ড</label>
                            <input type="password" id="admin-pwd" required class="w-full border rounded-lg px-3 py-2 focus:outline-primary" placeholder="****">
                        </div>
                        <button type="submit" class="w-full bg-gray-800 hover:bg-black text-white font-bold py-2 px-4 rounded-lg transition shadow-md">লগইন করুন</button>
                    </form>
                </div>
            </div>
        </div>

        <!-- STUDENT DASHBOARD -->
        <div id="view-student" class="hidden flex-1 flex flex-col md:flex-row h-screen">
            <!-- Mobile Header -->
            <div class="bg-primary text-white p-4 flex justify-between items-center md:hidden shadow-md z-10">
                <h1 class="font-bold text-lg truncate"><i class="fa-solid fa-leaf mr-2"></i>জীবনবিজ্ঞান সহায়ক</h1>
                <button onclick="toggleSidebar('std-sidebar')" class="text-white text-2xl"><i class="fa-solid fa-bars"></i></button>
            </div>

            <!-- Sidebar -->
            <aside id="std-sidebar" class="bg-white w-full md:w-72 shadow-lg h-full fixed md:relative z-20 transform -translate-x-full md:translate-x-0 transition-transform duration-300 flex flex-col">
                <div class="p-5 bg-primary text-white hidden md:block">
                    <h1 class="font-bold text-xl"><i class="fa-solid fa-leaf mr-2"></i>জীবনবিজ্ঞান সহায়ক</h1>
                    <p class="text-sm opacity-90 mt-1" id="std-user-name">Student Name</p>
                </div>
                <div class="md:hidden p-4 bg-gray-100 flex justify-between items-center border-b">
                    <span class="font-bold text-primary">মেনু</span>
                    <button onclick="toggleSidebar('std-sidebar')" class="text-xl text-gray-600"><i class="fa-solid fa-times"></i></button>
                </div>
                
                <div class="flex-1 overflow-y-auto py-4">
                    <p class="px-5 text-xs font-bold text-gray-400 uppercase mb-2">অধ্যায়সমূহ</p>
                    <nav id="std-chapter-list" class="space-y-1 mb-6"></nav>
                    
                    <p class="px-5 text-xs font-bold text-gray-400 uppercase mb-2">পরীক্ষা</p>
                    <nav>
                        <button onclick="loadStudentView('mock')" class="w-full text-left px-5 py-3 hover:bg-emerald-50 text-gray-700 font-semibold border-l-4 border-transparent hover:border-primary transition flex items-center gap-3">
                            <i class="fa-solid fa-laptop-file text-blue-500 w-5"></i> মক টেস্ট (Mock Test)
                        </button>
                    </nav>
                </div>
                <div class="p-4 border-t">
                    <button onclick="logout()" class="w-full py-2 bg-red-50 text-red-600 font-bold rounded-lg hover:bg-red-100 transition"><i class="fa-solid fa-sign-out-alt mr-2"></i>লগআউট</button>
                </div>
            </aside>

            <!-- Main Content Area -->
            <main class="flex-1 bg-gray-50 h-full overflow-y-auto p-4 md:p-8 relative" id="std-main-content">
                <!-- Content injected here -->
            </main>
        </div>

        <!-- ADMIN DASHBOARD -->
        <div id="view-admin" class="hidden flex-1 flex flex-col md:flex-row h-screen">
            <!-- Mobile Header -->
            <div class="bg-gray-800 text-white p-4 flex justify-between items-center md:hidden shadow-md z-10">
                <h1 class="font-bold text-lg"><i class="fa-solid fa-user-shield mr-2"></i>অ্যাডমিন প্যানেল</h1>
                <button onclick="toggleSidebar('admin-sidebar')" class="text-white text-2xl"><i class="fa-solid fa-bars"></i></button>
            </div>

            <!-- Sidebar -->
            <aside id="admin-sidebar" class="bg-gray-800 text-white w-full md:w-64 shadow-lg h-full fixed md:relative z-20 transform -translate-x-full md:translate-x-0 transition-transform duration-300 flex flex-col">
                <div class="p-5 border-b border-gray-700 hidden md:block">
                    <h1 class="font-bold text-xl"><i class="fa-solid fa-user-shield mr-2"></i>অ্যাডমিন প্যানেল</h1>
                </div>
                <div class="md:hidden p-4 bg-gray-900 flex justify-between items-center border-b border-gray-700">
                    <span class="font-bold text-white">মেনু</span>
                    <button onclick="toggleSidebar('admin-sidebar')" class="text-xl text-gray-400"><i class="fa-solid fa-times"></i></button>
                </div>
                
                <div class="flex-1 overflow-y-auto py-4">
                    <nav id="admin-nav" class="space-y-1">
                        <button onclick="switchAdminTab('students')" class="admin-tab w-full text-left px-5 py-3 hover:bg-gray-700 font-semibold border-l-4 border-transparent transition"><i class="fa-solid fa-users w-6"></i> ছাত্রছাত্রী</button>
                        <button onclick="switchAdminTab('logs')" class="admin-tab w-full text-left px-5 py-3 hover:bg-gray-700 font-semibold border-l-4 border-transparent transition"><i class="fa-solid fa-history w-6"></i> লগিন হিস্ট্রি</button>
                        <button onclick="switchAdminTab('materials')" class="admin-tab w-full text-left px-5 py-3 hover:bg-gray-700 font-semibold border-l-4 border-transparent transition"><i class="fa-solid fa-book w-6"></i> স্টাডি মেটেরিয়াল</button>
                        <button onclick="switchAdminTab('videos')" class="admin-tab w-full text-left px-5 py-3 hover:bg-gray-700 font-semibold border-l-4 border-transparent transition"><i class="fa-brands fa-youtube w-6 text-red-400"></i> ভিডিও ক্লাস</button>
                        <button onclick="switchAdminTab('mockTests')" class="admin-tab w-full text-left px-5 py-3 hover:bg-gray-700 font-semibold border-l-4 border-transparent transition"><i class="fa-solid fa-laptop-file w-6 text-blue-400"></i> মক টেস্ট</button>
                        <button onclick="switchAdminTab('practiceTests')" class="admin-tab w-full text-left px-5 py-3 hover:bg-gray-700 font-semibold border-l-4 border-transparent transition"><i class="fa-solid fa-brain w-6 text-purple-400"></i> প্র্যাকটিস MCQ</button>
                    </nav>
                </div>
                <div class="p-4 border-t border-gray-700">
                    <button onclick="logout()" class="w-full py-2 bg-red-600 hover:bg-red-700 text-white font-bold rounded-lg transition"><i class="fa-solid fa-sign-out-alt mr-2"></i>লগআউট</button>
                </div>
            </aside>

            <!-- Main Content Area -->
            <main class="flex-1 bg-gray-100 h-full overflow-y-auto p-4 md:p-8" id="admin-main-content">
                <!-- Content injected here -->
            </main>
        </div>
    </div>

    <!-- MAIN JAVASCRIPT LOGIC -->
    <script>
        // ==========================================
        // 1. CONFIGURATION & STATE
        // ==========================================
        
        // REPLACE THIS URL WITH YOUR PUBLISHED GOOGLE APPS SCRIPT WEB APP URL
        const GAS_URL = "https://script.google.com/macros/s/AKfycbyY792WioIYJuKtfIchKSNKd3RPTwTQ16RlAL8w56vM7TgAcm6W9IJTMesLBrvER7Vr7w/exec"; 

        const CHAPTERS = [
            "জীবজগতে নিয়ন্ত্রণ ও সমন্বয়",
            "জীবনের প্রবাহমানতা",
            "বংশগতি এবং কয়েকটি সাধারণ জিনগত রোগ",
            "অভিব্যক্তি ও অভিযোজন",
            "পরিবেশ, তার সম্পদ এবং তাদের সংরক্ষণ"
        ];

        let state = {
            currentUser: null, // object for student, 'admin' for admin
            view: 'login', // login, student, admin
            data: { materials: [], videos: [], mockTests: [], practiceTests: [], students: [], logs: [] },
            currentChapter: 0,
            studentTab: 'notes',
            score: 0
        };

        // ==========================================
        // 2. UTILITY FUNCTIONS
        // ==========================================

        function showSpinner(show) {
            document.getElementById('loader').style.display = show ? 'flex' : 'none';
        }

        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const color = type === 'success' ? 'bg-green-500' : (type === 'error' ? 'bg-red-500' : 'bg-blue-500');
            toast.className = `${color} text-white px-4 py-3 rounded-lg shadow-lg transform transition-all duration-300 translate-x-full flex items-center gap-2`;
            toast.innerHTML = `<i class="fa-solid ${type === 'success' ? 'fa-check-circle' : 'fa-info-circle'}"></i> ${message}`;
            
            container.appendChild(toast);
            setTimeout(() => toast.classList.remove('translate-x-full'), 10);
            setTimeout(() => {
                toast.classList.add('translate-x-full');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        function toBengaliNum(num) {
            const digits = ['০', '১', '২', '৩', '৪', '৫', '৬', '৭', '৮', '৯'];
            return num.toString().split('').map(d => digits[d] || d).join('');
        }

        function toggleSidebar(id) {
            const sidebar = document.getElementById(id);
            sidebar.classList.toggle('-translate-x-full');
        }

        // ==========================================
        // 3. API & DATA MANAGEMENT
        // ==========================================

        async function fetchAPI(action = 'get', payload = null) {
            if(GAS_URL === "YOUR_GOOGLE_APPS_SCRIPT_WEB_APP_URL_HERE"){
                // Mock behavior if URL is not set
                console.warn("GAS URL not set. Using LocalStorage Fallback.");
                return handleLocalAPI(action, payload);
            }

            try {
                if (action === 'get') {
                    const res = await fetch(GAS_URL);
                    const json = await res.json();
                    if(json.status === 'success') {
                        state.data = json.data;
                        localStorage.setItem('ls_data', JSON.stringify(state.data));
                        return true;
                    }
                } else {
                    const res = await fetch(GAS_URL, {
                        method: 'POST',
                        body: JSON.stringify({ action, data: payload })
                    });
                    const json = await res.json();
                    return json.status === 'success';
                }
            } catch (err) {
                console.error("API Error:", err);
                // Fallback to local storage
                return handleLocalAPI(action, payload);
            }
        }

        function handleLocalAPI(action, payload) {
            const local = JSON.parse(localStorage.getItem('ls_data')) || { materials: [], videos: [], mockTests: [], practiceTests: [], students: [], logs: [] };
            
            if (action === 'get') {
                state.data = local;
                return true;
            } else {
                let key = action.replace('add_', '') + 's';
                if(key === 'student_logs') key = 'logs'; // fix formatting
                if(local[key]) local[key].push(payload);
                state.data = local;
                localStorage.setItem('ls_data', JSON.stringify(local));
                return true;
            }
        }

        async function initData() {
            showSpinner(true);
            await fetchAPI('get');
            showSpinner(false);
        }

        // ==========================================
        // 4. AUTHENTICATION
        // ==========================================

        function toggleAuthTab(type) {
            document.getElementById('form-student-login').classList.toggle('hidden', type !== 'student');
            document.getElementById('form-admin-login').classList.toggle('hidden', type !== 'admin');
            
            const stdTab = document.getElementById('tab-login-student');
            const admTab = document.getElementById('tab-login-admin');
            
            if(type === 'student') {
                stdTab.classList.replace('text-gray-500', 'text-primary');
                stdTab.classList.replace('hover:bg-gray-50', 'bg-gray-50');
                stdTab.classList.add('border-b-2', 'border-primary');
                
                admTab.classList.replace('text-primary', 'text-gray-500');
                admTab.classList.remove('border-b-2', 'border-primary');
            } else {
                admTab.classList.replace('text-gray-500', 'text-primary');
                admTab.classList.replace('hover:bg-gray-50', 'bg-gray-50');
                admTab.classList.add('border-b-2', 'border-primary');
                
                stdTab.classList.replace('text-primary', 'text-gray-500');
                stdTab.classList.remove('border-b-2', 'border-primary');
            }
        }

        async function handleStudentLogin(e) {
            e.preventDefault();
            const student = {
                name: document.getElementById('std-name').value.trim(),
                roll: document.getElementById('std-roll').value.trim(),
                section: document.getElementById('std-sec').value.trim().toUpperCase(),
                class: document.getElementById('std-class').value,
                school: document.getElementById('std-school').value.trim()
            };

            showSpinner(true);
            await initData(); // Refresh data

            // Check if exists, else add
            const exists = state.data.students.find(s => s.roll == student.roll && s.name === student.name);
            if (!exists) {
                await fetchAPI('add_student', student);
            }

            // Add Log
            const log = {
                date: new Date().toLocaleString('en-IN'),
                name: student.name,
                roll: student.roll,
                classSec: `${student.class} - ${student.section}`
            };
            await fetchAPI('add_log', log);

            localStorage.setItem('auth_user', JSON.stringify({ type: 'student', data: student }));
            state.currentUser = student;
            showToast(`স্বাগতম, ${student.name}!`);
            showSpinner(false);
            initApp();
        }

        function handleAdminLogin(e) {
            e.preventDefault();
            const id = document.getElementById('admin-id').value;
            const pwd = document.getElementById('admin-pwd').value;

            if (id === 'admin' && pwd === '1234') {
                localStorage.setItem('auth_user', JSON.stringify({ type: 'admin' }));
                state.currentUser = 'admin';
                showToast('অ্যাডমিন লগইন সফল!');
                initApp();
            } else {
                showToast('ভুল আইডি বা পাসওয়ার্ড!', 'error');
            }
        }

        function logout() {
            localStorage.removeItem('auth_user');
            state.currentUser = null;
            initApp();
        }

        // ==========================================
        // 5. ROUTING & INITIALIZATION
        // ==========================================

        async function initApp() {
            const authStr = localStorage.getItem('auth_user');
            if (authStr) {
                const auth = JSON.parse(authStr);
                if (auth.type === 'admin') {
                    state.currentUser = 'admin';
                    document.getElementById('view-login').classList.add('hidden');
                    document.getElementById('view-student').classList.add('hidden');
                    document.getElementById('view-admin').classList.remove('hidden');
                    await initData();
                    switchAdminTab('students');
                } else {
                    state.currentUser = auth.data;
                    document.getElementById('view-login').classList.add('hidden');
                    document.getElementById('view-admin').classList.add('hidden');
                    document.getElementById('view-student').classList.remove('hidden');
                    document.getElementById('std-user-name').innerText = auth.data.name;
                    await initData();
                    renderStudentSidebar();
                    loadStudentView('chapter', 0);
                }
            } else {
                document.getElementById('view-student').classList.add('hidden');
                document.getElementById('view-admin').classList.add('hidden');
                document.getElementById('view-login').classList.remove('hidden');
            }
        }

        // ==========================================
        // 6. STUDENT DASHBOARD LOGIC
        // ==========================================

        function renderStudentSidebar() {
            const list = document.getElementById('std-chapter-list');
            list.innerHTML = CHAPTERS.map((ch, idx) => `
                <button onclick="loadStudentView('chapter', ${idx})" class="std-nav-btn w-full text-left px-5 py-3 hover:bg-emerald-50 text-gray-700 font-medium border-l-4 border-transparent hover:border-primary transition flex items-center gap-3 text-sm" data-idx="${idx}">
                    <div class="w-6 h-6 rounded-full bg-emerald-100 text-primary flex items-center justify-center font-bold text-xs shrink-0">${toBengaliNum(idx+1)}</div>
                    <span class="line-clamp-2">${ch}</span>
                </button>
            `).join('');
        }

        function loadStudentView(type, index = null) {
            const main = document.getElementById('std-main-content');
            
            // Highlight nav
            document.querySelectorAll('.std-nav-btn').forEach(btn => {
                btn.classList.remove('bg-emerald-50', 'border-primary', 'text-primary');
                btn.classList.add('border-transparent', 'text-gray-700');
            });

            if (type === 'mock') {
                state.currentChapter = null;
                renderMockTests(main);
            } else if (type === 'chapter') {
                state.currentChapter = index;
                // highlight active chapter
                const activeBtn = document.querySelector(`.std-nav-btn[data-idx="${index}"]`);
                if(activeBtn) {
                    activeBtn.classList.remove('border-transparent', 'text-gray-700');
                    activeBtn.classList.add('bg-emerald-50', 'border-primary', 'text-primary');
                }
                renderChapterContent(main, index);
            }

            // close mobile sidebar
            if (window.innerWidth < 768) {
                document.getElementById('std-sidebar').classList.add('-translate-x-full');
            }
        }

        function renderMockTests(container) {
            const tests = state.data.mockTests;
            
            let html = `
                <div class="max-w-4xl mx-auto">
                    <h2 class="text-2xl font-bold text-gray-800 mb-6 flex items-center gap-2"><i class="fa-solid fa-laptop-file text-blue-500"></i> মক টেস্ট সমূহ</h2>
            `;

            if (tests.length === 0) {
                html += `<div class="bg-white p-8 rounded-xl shadow text-center text-gray-500">বর্তমানে কোনো মক টেস্ট উপলব্ধ নেই।</div>`;
            } else {
                html += `<div class="grid grid-cols-1 md:grid-cols-2 gap-4">`;
                tests.forEach((t, i) => {
                    html += `
                        <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-100 hover:shadow-md transition">
                            <div class="flex items-start gap-4">
                                <div class="bg-blue-100 text-blue-600 w-12 h-12 rounded-lg flex items-center justify-center text-xl shrink-0"><i class="fa-solid fa-file-signature"></i></div>
                                <div>
                                    <h3 class="font-bold text-gray-800 mb-2">${t.title}</h3>
                                    <button onclick="openExternalTest('${t.link}')" class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-semibold transition shadow-sm">
                                        Test Start করুন <i class="fa-solid fa-arrow-up-right-from-square ml-1 text-xs"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    `;
                });
                html += `</div>`;
            }
            html += `</div>`;
            container.innerHTML = html;
        }

        function openExternalTest(url) {
            // Replaced alert() with showToast() per mandatory rules
            showToast('এই টেস্টটি একটি বাইরের লিংকে খুলবে।', 'info');
            window.open(url, '_blank');
        }

        function renderChapterContent(container, chapterIndex) {
            const chName = CHAPTERS[chapterIndex];
            state.studentTab = state.studentTab || 'notes';
            state.score = 0; // Reset score on chapter change

            let html = `
                <div class="max-w-4xl mx-auto">
                    <div class="bg-white rounded-xl shadow-sm p-6 mb-6 border-l-4 border-primary">
                        <h2 class="text-xl md:text-2xl font-bold text-gray-800">অধ্যায় ${toBengaliNum(chapterIndex + 1)}: ${chName}</h2>
                    </div>

                    <!-- Tabs -->
                    <div class="flex gap-2 border-b mb-6 overflow-x-auto pb-1 hide-scrollbar">
                        <button onclick="switchChapterTab('notes')" class="tab-btn whitespace-nowrap px-4 py-2 font-semibold ${state.studentTab === 'notes' ? 'active' : 'text-gray-500 hover:text-gray-800'}"><i class="fa-solid fa-book-open mr-2"></i>স্টাডি নোটস</button>
                        <button onclick="switchChapterTab('pyq')" class="tab-btn whitespace-nowrap px-4 py-2 font-semibold ${state.studentTab === 'pyq' ? 'active' : 'text-gray-500 hover:text-gray-800'}"><i class="fa-solid fa-clock-rotate-left mr-2"></i>পূর্ববর্তী প্রশ্ন</button>
                        <button onclick="switchChapterTab('qbank')" class="tab-btn whitespace-nowrap px-4 py-2 font-semibold ${state.studentTab === 'qbank' ? 'active' : 'text-gray-500 hover:text-gray-800'}"><i class="fa-solid fa-layer-group mr-2"></i>প্রশ্ন সংকলন</button>
                        <button onclick="switchChapterTab('videos')" class="tab-btn whitespace-nowrap px-4 py-2 font-semibold ${state.studentTab === 'videos' ? 'active' : 'text-gray-500 hover:text-gray-800'}"><i class="fa-brands fa-youtube text-red-500 mr-2"></i>ভিডিও ক্লাস</button>
                        <button onclick="switchChapterTab('mcq')" class="tab-btn whitespace-nowrap px-4 py-2 font-semibold ${state.studentTab === 'mcq' ? 'active' : 'text-gray-500 hover:text-gray-800'}"><i class="fa-solid fa-brain text-purple-500 mr-2"></i>প্র্যাকটিস MCQ</button>
                    </div>
                    
                    <div id="tab-content-area"></div>
                </div>
            `;
            container.innerHTML = html;
            switchChapterTab(state.studentTab);
        }

        function switchChapterTab(tab) {
            state.studentTab = tab;
            const area = document.getElementById('tab-content-area');
            if(!area) return;
            
            // Re-render tabs highlighting
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.className = `tab-btn whitespace-nowrap px-4 py-2 font-semibold text-gray-500 hover:text-gray-800`;
                if(btn.innerHTML.includes(tab === 'notes' ? 'নোটস' : tab === 'pyq' ? 'পূর্ববর্তী' : tab === 'qbank' ? 'সংকলন' : tab === 'videos' ? 'ভিডিও' : 'MCQ')) {
                    btn.classList.add('active', 'border-b-2', 'border-primary', 'text-primary');
                    btn.classList.remove('text-gray-500', 'hover:text-gray-800');
                }
            });

            const chName = CHAPTERS[state.currentChapter];

            if (tab === 'notes' || tab === 'pyq' || tab === 'qbank') {
                const targetType = tab === 'notes' ? 'Notes' : tab === 'pyq' ? 'PYQ' : 'QuestionBank';
                const emptyMsg = tab === 'notes' ? 'নোটস' : tab === 'pyq' ? 'পূর্ববর্তী মাধ্যমিক প্রশ্ন' : 'প্রশ্ন সংকলন';
                
                const materials = state.data.materials.filter(m => m.chapter === chName && m.type === targetType);
                
                if(materials.length === 0) {
                    area.innerHTML = `<div class="p-8 text-center bg-white rounded-xl text-gray-500 shadow-sm">এই অধ্যায়ের কোনো ${emptyMsg} এখনো আপলোড করা হয়নি।</div>`;
                } else {
                    area.innerHTML = `<div class="grid gap-4 md:grid-cols-2">` + materials.map(m => `
                        <a href="${m.link}" target="_blank" class="flex items-center p-4 bg-white rounded-xl shadow-sm hover:shadow-md border border-gray-100 transition group">
                            <div class="bg-emerald-100 text-primary w-12 h-12 rounded-lg flex items-center justify-center text-xl shrink-0 group-hover:scale-110 transition"><i class="fa-solid fa-file-pdf"></i></div>
                            <div class="ml-4">
                                <span class="text-xs font-bold text-gray-400 uppercase tracking-wider">${m.type === 'PYQ' ? 'Previous Year' : m.type === 'QuestionBank' ? 'Q-Bank' : 'Notes'}</span>
                                <h3 class="font-bold text-gray-800 leading-tight">${m.title}</h3>
                            </div>
                        </a>
                    `).join('') + `</div>`;
                }
            } 
            else if (tab === 'videos') {
                const videos = state.data.videos.filter(v => v.chapter === chName);
                if(videos.length === 0) area.innerHTML = `<div class="p-8 text-center bg-white rounded-xl text-gray-500 shadow-sm">এই অধ্যায়ের কোনো ভিডিও ক্লাস উপলব্ধ নেই।</div>`;
                else {
                    area.innerHTML = `<div class="grid gap-4 md:grid-cols-2">` + videos.map(v => {
                        // Extract YT ID for thumbnail
                        let ytId = '';
                        try { ytId = v.link.split('v=')[1]?.split('&')[0] || v.link.split('youtu.be/')[1]?.split('?')[0]; } catch(e){}
                        const thumb = ytId ? `https://img.youtube.com/vi/${ytId}/hqdefault.jpg` : 'https://via.placeholder.com/320x180?text=Video';
                        
                        return `
                        <a href="${v.link}" target="_blank" class="block bg-white rounded-xl overflow-hidden shadow-sm hover:shadow-lg transition">
                            <div class="relative">
                                <img src="${thumb}" class="w-full h-40 object-cover" alt="Video">
                                <div class="absolute inset-0 bg-black/20 flex items-center justify-center group-hover:bg-black/10 transition">
                                    <i class="fa-brands fa-youtube text-4xl text-white drop-shadow-md"></i>
                                </div>
                            </div>
                            <div class="p-4">
                                <h3 class="font-bold text-gray-800 line-clamp-2">${v.title}</h3>
                            </div>
                        </a>
                    `}).join('') + `</div>`;
                }
            }
            else if (tab === 'mcq') {
                renderMCQ(area, chName);
            }
        }

        function renderMCQ(container, chName) {
            const mcqs = state.data.practiceTests.filter(q => q.chapter === chName);
            
            if(mcqs.length === 0) {
                container.innerHTML = `<div class="p-8 text-center bg-white rounded-xl text-gray-500 shadow-sm">এই অধ্যায়ের কোনো প্র্যাকটিস মক টেস্ট উপলব্ধ নেই।</div>`;
                return;
            }

            let html = `<div class="grid grid-cols-1 md:grid-cols-2 gap-4">`;

            mcqs.forEach((q, i) => {
                html += `
                    <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-100 hover:shadow-md transition">
                        <div class="flex items-start gap-4">
                            <div class="bg-purple-100 text-purple-600 w-12 h-12 rounded-lg flex items-center justify-center text-xl shrink-0"><i class="fa-solid fa-list-check"></i></div>
                            <div>
                                <h3 class="font-bold text-gray-800 mb-2">${q.title}</h3>
                                <button onclick="openExternalTest('${q.link}')" class="bg-purple-500 hover:bg-purple-600 text-white px-4 py-2 rounded-lg text-sm font-semibold transition shadow-sm">
                                    Test Start করুন <i class="fa-solid fa-arrow-up-right-from-square ml-1 text-xs"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            });

            html += `</div>`;
            container.innerHTML = html;
        }

        // ==========================================
        // 7. ADMIN DASHBOARD LOGIC
        // ==========================================

        function switchAdminTab(tabId) {
            // UI styling
            document.querySelectorAll('.admin-tab').forEach(el => {
                el.classList.remove('bg-gray-700', 'border-primary');
                el.classList.add('border-transparent');
            });
            
            // Find the active tab button by matching the onclick attribute
            const activeBtn = document.querySelector(`button[onclick="switchAdminTab('${tabId}')"]`);
            if (activeBtn) {
                activeBtn.classList.add('bg-gray-700', 'border-primary');
                activeBtn.classList.remove('border-transparent');
            }

            if (window.innerWidth < 768) {
                document.getElementById('admin-sidebar').classList.add('-translate-x-full');
            }

            renderAdminContent(tabId);
        }

        function renderAdminContent(tabId) {
            const main = document.getElementById('admin-main-content');
            let html = '';

            const chOptions = CHAPTERS.map(c => `<option value="${c}">${c}</option>`).join('');

            if (tabId === 'students') {
                html = `
                    <h2 class="text-2xl font-bold mb-4">নিবন্ধিত ছাত্রছাত্রী (${state.data.students.length})</h2>
                    <div class="bg-white rounded-lg shadow overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead><tr class="bg-gray-200 text-gray-700"><th class="p-3">নাম</th><th class="p-3">রোল</th><th class="p-3">সেকশন</th><th class="p-3">স্কুল</th></tr></thead>
                            <tbody>
                                ${state.data.students.map(s => `<tr class="border-b"><td class="p-3">${s.name}</td><td class="p-3">${s.roll}</td><td class="p-3">${s.section}</td><td class="p-3">${s.school}</td></tr>`).join('')}
                            </tbody>
                        </table>
                    </div>
                `;
            } 
            else if (tabId === 'logs') {
                html = `
                    <h2 class="text-2xl font-bold mb-4">লগিন হিস্ট্রি</h2>
                    <div class="bg-white rounded-lg shadow overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead><tr class="bg-gray-200 text-gray-700"><th class="p-3">তারিখ ও সময়</th><th class="p-3">নাম</th><th class="p-3">রোল</th><th class="p-3">ক্লাস-সেকশন</th></tr></thead>
                            <tbody>
                                ${[...state.data.logs].reverse().slice(0, 100).map(l => `<tr class="border-b"><td class="p-3 text-sm text-gray-500">${l.date}</td><td class="p-3 font-semibold">${l.name}</td><td class="p-3">${l.roll}</td><td class="p-3">${l.classSec}</td></tr>`).join('')}
                            </tbody>
                        </table>
                    </div>
                `;
            }
            else if (tabId === 'materials') {
                html = `
                    <h2 class="text-2xl font-bold mb-4">স্টাডি মেটেরিয়াল যোগ করুন</h2>
                    <form onsubmit="handleAdminSubmit(event, 'add_material')" class="bg-white p-5 rounded-lg shadow mb-6 space-y-4">
                        <div class="grid md:grid-cols-2 gap-4">
                            <div><label class="block text-sm font-bold mb-1">অধ্যায়</label><select name="chapter" class="w-full border rounded p-2">${chOptions}</select></div>
                            <div>
                                <label class="block text-sm font-bold mb-1">ক্যাটাগরি/টাইপ</label>
                                <select name="type" class="w-full border rounded p-2 bg-gray-50">
                                    <option value="Notes">স্টাডি নোটস</option>
                                    <option value="PYQ">পূর্ববর্তী পরীক্ষার প্রশ্ন (PYQ)</option>
                                    <option value="QuestionBank">প্রশ্ন সংকলন</option>
                                </select>
                            </div>
                            <div class="md:col-span-2"><label class="block text-sm font-bold mb-1">শিরোনাম</label><input type="text" name="title" required class="w-full border rounded p-2"></div>
                            <div class="md:col-span-2"><label class="block text-sm font-bold mb-1">লিংক (Drive PDF etc.)</label><input type="url" name="link" required class="w-full border rounded p-2"></div>
                        </div>
                        <button type="submit" class="bg-primary text-white px-4 py-2 rounded font-bold hover:bg-dark">যোগ করুন</button>
                    </form>
                    <h3 class="font-bold mb-2">বিদ্যমান মেটেরিয়ালস (${state.data.materials.length})</h3>
                    <ul class="space-y-2">
                        ${state.data.materials.map(m => `<li class="bg-white p-3 rounded shadow-sm text-sm border-l-4 border-primary"><b>${m.chapter}</b> <span class="bg-gray-200 px-2 py-0.5 rounded text-xs ml-2">${m.type === 'PYQ' ? 'Previous Year' : m.type}</span> <br><a href="${m.link}" target="_blank" class="text-blue-600 hover:underline mt-1 inline-block">${m.title}</a></li>`).join('')}
                    </ul>
                `;
            }
            else if (tabId === 'videos') {
                html = `
                    <h2 class="text-2xl font-bold mb-4">ভিডিও ক্লাস যোগ করুন</h2>
                    <form onsubmit="handleAdminSubmit(event, 'add_video')" class="bg-white p-5 rounded-lg shadow mb-6 space-y-4">
                        <div><label class="block text-sm font-bold mb-1">অধ্যায়</label><select name="chapter" class="w-full border rounded p-2">${chOptions}</select></div>
                        <div><label class="block text-sm font-bold mb-1">শিরোনাম</label><input type="text" name="title" required class="w-full border rounded p-2"></div>
                        <div><label class="block text-sm font-bold mb-1">ইউটিউব লিংক</label><input type="url" name="link" required class="w-full border rounded p-2"></div>
                        <button type="submit" class="bg-red-500 text-white px-4 py-2 rounded font-bold hover:bg-red-600">যোগ করুন</button>
                    </form>
                    <ul class="space-y-2">
                        ${state.data.videos.map(v => `<li class="bg-white p-3 rounded shadow-sm text-sm border-l-4 border-red-500"><b>${v.chapter}</b>: <a href="${v.link}" target="_blank" class="text-blue-600 hover:underline">${v.title}</a></li>`).join('')}
                    </ul>
                `;
            }
            else if (tabId === 'mockTests') {
                html = `
                    <h2 class="text-2xl font-bold mb-4">গ্লোবাল মক টেস্ট যোগ করুন</h2>
                    <form onsubmit="handleAdminSubmit(event, 'add_mock_test')" class="bg-white p-5 rounded-lg shadow mb-6 space-y-4">
                        <div><label class="block text-sm font-bold mb-1">পরীক্ষার নাম/শিরোনাম</label><input type="text" name="title" required class="w-full border rounded p-2"></div>
                        <div><label class="block text-sm font-bold mb-1">লিংক (Google Form / Any Tool)</label><input type="url" name="link" required class="w-full border rounded p-2"></div>
                        <button type="submit" class="bg-blue-500 text-white px-4 py-2 rounded font-bold hover:bg-blue-600">যোগ করুন</button>
                    </form>
                    <ul class="space-y-2">
                        ${state.data.mockTests.map(m => `<li class="bg-white p-3 rounded shadow-sm flex justify-between items-center border-l-4 border-blue-500"><span><b>${m.title}</b></span> <a href="${m.link}" target="_blank" class="text-xs bg-gray-200 px-2 py-1 rounded hover:bg-gray-300">Open <i class="fa-solid fa-external-link-alt"></i></a></li>`).join('')}
                    </ul>
                `;
            }
            else if (tabId === 'practiceTests') {
                html = `
                    <h2 class="text-2xl font-bold mb-4">অধ্যায়ভিত্তিক মক টেস্ট (Google Form) যোগ করুন</h2>
                    <form onsubmit="handleAdminSubmit(event, 'add_practice_test')" class="bg-white p-5 rounded-lg shadow mb-6 space-y-4">
                        <div><label class="block text-sm font-bold mb-1">অধ্যায়</label><select name="chapter" class="w-full border rounded p-2">${chOptions}</select></div>
                        <div><label class="block text-sm font-bold mb-1">টেস্টের নাম/শিরোনাম</label><input type="text" name="title" required class="w-full border rounded p-2"></div>
                        <div><label class="block text-sm font-bold mb-1">Google Form লিংক</label><input type="url" name="link" required class="w-full border rounded p-2"></div>
                        <button type="submit" class="bg-purple-600 text-white px-4 py-2 rounded font-bold hover:bg-purple-700">যোগ করুন</button>
                    </form>
                    <ul class="space-y-2">
                        ${state.data.practiceTests.map(p => `<li class="bg-white p-3 rounded shadow-sm flex justify-between items-center border-l-4 border-purple-500"><span><b>${p.chapter}</b> - ${p.title}</span> <a href="${p.link}" target="_blank" class="text-xs bg-gray-200 px-2 py-1 rounded hover:bg-gray-300">Open <i class="fa-solid fa-external-link-alt"></i></a></li>`).join('')}
                    </ul>
                `;
            }

            main.innerHTML = html;
        }

        async function handleAdminSubmit(e, action) {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());
            
            showSpinner(true);
            const success = await fetchAPI(action, data);
            
            if (success) {
                showToast('সফলভাবে যুক্ত করা হয়েছে!');
                e.target.reset();
                await initData(); // Re-fetch
                
                // Re-render current tab
                const currentTabMap = {
                    'add_material': 'materials',
                    'add_video': 'videos',
                    'add_mock_test': 'mockTests',
                    'add_practice_test': 'practiceTests'
                };
                renderAdminContent(currentTabMap[action]);
            } else {
                showToast('সংরক্ষণ করতে সমস্যা হয়েছে!', 'error');
            }
            showSpinner(false);
        }

        // ==========================================
        // INITIALIZE APP ON LOAD
        // ==========================================
        window.addEventListener('DOMContentLoaded', initApp);

    </script>
</body>
</html>
